<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
        }

        .form-box {
            width: 400px;
            margin: auto;
            margin-top: 40px;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #5b8def;
            color: white;
            border: none;
            border-radius: 5px;
        }

        output {
            display: block;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <div class="form-box">

        <h2>Event Registration</h2>

        <form onsubmit="showMessage(event)">

            <label>Name:</label>
            <input type="text" placeholder="Enter your name" required autofocus>

            <label>Email:</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Date:</label>
            <input type="date" required>

            <label>Event Type:</label>
            <select required>
                <option value="">Select Event</option>
                <option>Tree Plantation</option>
                <option>Health Camp</option>
                <option>Clean City</option>
                <option>Yoga Day</option>
                <option>Food Drive</option>
            </select>

            <label>Message:</label>
            <textarea placeholder="Any message..." rows="4"></textarea>

            <button type="submit">Register</button>

        </form>

        <output id="msg"></output>

    </div>

    <script>
        function showMessage(event) {
            event.preventDefault(); // stops page reload

            document.getElementById("msg").innerHTML =
                "Registration Successful!";
        }
    </script>

</body>

</html>
