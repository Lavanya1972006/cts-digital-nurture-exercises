<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        table {
            margin: auto;
            border-collapse: collapse;
        }

        caption {
            font-size: 22px;
            font-weight: bold;
            margin: 15px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        .event-img {
            border: 3px solid #5b8def;
            width: 180px;
            height: 120px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <table>

        <caption>Past Community Event Memories</caption>

        <tr>
            <td>
                <img src="images/event-1.jpg" alt="Tree Plantation" title="Tree Plantation Drive" class="event-img">
            </td>
            <td>
                <img src="images/event-2.jpg" alt="Health Camp" title="Health Awareness Camp" class="event-img">
            </td>
            <td>
                <img src="images/event-3.jpg" alt="Clean City" title="Clean City Program" class="event-img">
            </td>
        </tr>

        <tr>
            <td>
                <img src="images/event-4.jpg" alt="Blood Donation" title="Blood Donation Camp" class="event-img">
            </td>
            <td>
                <img src="images/event-5.jpg" alt="Yoga Day" title="International Yoga Day" class="event-img">
            </td>
            <td>
                <img src="images/event-6.jpg" alt="Food Drive" title="Community Food Drive" class="event-img">
            </td>
        </tr>

    </table>

</body>

</html>
