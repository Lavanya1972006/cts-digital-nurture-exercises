<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geolocation Event Mapping</title>
</head>

<body>

  <h2>Event Locator</h2>

  <button onclick="findLocation()">Find Nearby Events</button>

  <p id="output">Click button to get location</p>

  <script>
    function findLocation() {

      const output = document.getElementById("output");

      // Show loading message
      output.innerText = "Fetching location...";

      if (!navigator.geolocation) {
        output.innerText = "Geolocation not supported in your browser.";
        return;
      }

      const options = {
        enableHighAccuracy: true,
        timeout: 30000,   // FIX: increased timeout
        maximumAge: 0
      };

      navigator.geolocation.getCurrentPosition(
        // SUCCESS
        function (position) {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          output.innerHTML =
            "Latitude: " + lat + "<br>Longitude: " + lon +
            "<br><a target='_blank' href='https://www.google.com/maps?q=" + lat + "," + lon + "'>Open in Google Maps</a>";
        },

        // ERROR
        function (err) {
          switch (err.code) {

            case err.PERMISSION_DENIED:
              output.innerText = "Permission denied. Please allow location access.";
              break;

            case err.TIMEOUT:
              output.innerText = "Request timed out. Try again.";
              break;

            case err.POSITION_UNAVAILABLE:
              output.innerText = "Location unavailable.";
              break;

            default:
              output.innerText = "Unknown error occurred.";
              break;
          }
        },

        options
      );
    }
  </script>

</body>
</html>
