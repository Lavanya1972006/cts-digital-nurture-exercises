<!-- Ex 11.2: Media object layout using flex utilities -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex11_2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex align-items-start border p-3">

        <img src="https://dummyimage.com/100x100/000/fff"
             class="me-3 rounded"
             alt="image">

        <div>
            <h5 class="mb-1">Media Heading</h5>
            <p class="mb-0">
                Image is on left and content is on right using Bootstrap flex utilities.
            </p>
        </div>

    </div>

</div>

</body>
</html>
