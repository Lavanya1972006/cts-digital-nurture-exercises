<!-- Ex 7.2: Text transformation using uppercase, lowercase, capitalize -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex7_2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <p class="text-uppercase">bootstrap framework</p>

    <p class="text-lowercase">BOOTSTRAP FRAMEWORK</p>

    <p class="text-capitalize">bootstrap framework utilities</p>

</div>

</body>
</html>
