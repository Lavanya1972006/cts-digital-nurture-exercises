<!-- Ex 3.2: Using container, row, and col classes for layout -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5 Setup</title>
    <link rel="stylesheet" href="./ex1_2/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">

        <div class="row">

            <div class="col-md-6">
                <div class="bg-primary text-white p-5 text-center">
                    Frontend
                </div>
            </div>

            <div class="col-md-6">
                <div class="bg-success text-white p-5 text-center">
                    Backend
                </div>
            </div>

        </div>

    </div>

    <script src="./ex1_2/js/bootstrap.min.js"></script>
</body>
</html>
