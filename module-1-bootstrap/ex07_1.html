<!-- Ex 7.1: Typography utilities like display-1, lead, text-muted, fw-bold -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex7_1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="display-1">Display Heading</h1>

    <p class="lead">This is a lead paragraph.</p>

    <p class="text-muted">This is muted text.</p>

    <p class="fw-bold">This is bold text.</p>

    <p class="fst-italic">This is italic text.</p>

</div>

</body>
</html>
