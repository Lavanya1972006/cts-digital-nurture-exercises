<h3>Bootstrap Sass Setup Steps</h3>

<pre>
1. npm init -y
2. npm install bootstrap
3. Create scss/style.scss
4. Import bootstrap:
   @import "bootstrap/scss/bootstrap";

5. Compile:
   sass scss:css
</pre>

</body>
