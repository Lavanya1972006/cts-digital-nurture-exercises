<!-- Ex 18.2: Accordion using Bootstrap collapse -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ex18_2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<div class="accordion" id="acc">

    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#a1">
                Section 1
            </button>
        </h2>
        <div id="a1" class="accordion-collapse collapse show" data-bs-parent="#acc">
            <div class="accordion-body">
                Content 1
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#a2">
                Section 2
            </button>
        </h2>
        <div id="a2" class="accordion-collapse collapse" data-bs-parent="#acc">
            <div class="accordion-body">
                Content 2
            </div>
        </div>
    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
