<!-- Ex 2.2: Include Bootstrap JavaScript plugins via bundle file -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5 Setup</title>
    <link rel="stylesheet" href="./ex1_2/css/bootstrap.min.css">
</head>
<body>
 <div class="container mt-5">

        <h2>Bootstrap JavaScript Plugin Example</h2>

        <!-- Button -->
        <button type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#myModal">
            Open Modal
        </button>

        <!-- Modal -->
        <div class="modal fade" id="myModal">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h4 class="modal-title">Bootstrap Modal</h4>
                    </div>

                    <div class="modal-body">
                        Bootstrap JavaScript plugins are added successfully.

                        <br><br>

                        <button type="button"
                                class="btn btn-danger"
                                data-bs-dismiss="modal">
                            Close
                        </button>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <script src="./ex1_2/js/bootstrap.bundle.min.js"></script>

</body>
</html>
